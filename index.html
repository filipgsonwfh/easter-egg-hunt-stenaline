<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stena Line - Påskäggsjakt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-inner">
                <svg class="stena-logo" viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="0" y="22" font-family="Open Sans, Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff">STENA LINE</text>
                </svg>
            </div>
        </header>

        <main class="container">
            <div class="hero">
                <h1>Påskäggsjakt</h1>
                <p class="hero-sub">Hitta alla 72 ägg och avslöja det hemliga pusslet!</p>
            </div>

            <div class="stats-card">
                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-number" id="eggsFound">0</span>
                        <span class="stat-label">Hittade</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="eggsRemaining">72</span>
                        <span class="stat-label">Kvar</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">0% avklarat</p>
            </div>

            <div class="puzzle-card">
                <div class="puzzle-container" id="puzzleContainer">
                    <!-- 72 puzzle pieces generated by JS (9 columns x 8 rows) -->
                </div>
            </div>

            <div id="allFoundBanner" class="all-found-banner hidden">
                <h2>Alla ägg hittade!</h2>
                <p>Fantastiskt! Pusslet är komplett!</p>
            </div>
        </main>

        <footer class="footer">
            <p>Stena Line Påskäggsjakt 2026</p>
        </footer>

        <!-- Modal for egg scan feedback -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon" id="modalIcon"></div>
                <h2 id="modalTitle"></h2>
                <p id="modalMessage"></p>
                <button class="btn btn-primary" id="modalClose">Stäng</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
