<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt - Stena Line</title>
    <link rel="icon" type="image/jpeg" href="images/faviconV2.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-inner">
                <div class="header-logo">
                    <img class="stena-logo" src="images/stenalinelogo.jpg" alt="Stena Line">
                </div>
            </div>
        </header>

        <main class="container">
            <div class="hero">
                <h1>Easter Egg Hunt</h1>
                <p class="hero-sub">Find all 72 eggs and reveal the hidden puzzle!</p>
            </div>

            <div class="card">
                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-number" id="eggsFound">0</span>
                        <span class="stat-label">Found</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="eggsRemaining">72</span>
                        <span class="stat-label">Remaining</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">0% complete</p>
            </div>

            <div class="card feed-card">
                <h3 class="feed-title">Live Activity</h3>
                <div class="feed-list" id="activityFeed">
                    <p class="feed-empty" id="feedEmpty">No eggs found yet. Start scanning!</p>
                </div>
            </div>

            <div class="puzzle-card">
                <div class="puzzle-container" id="puzzleContainer"></div>
            </div>

            <div id="allFoundBanner" class="all-found-banner hidden">
                <h2>All eggs found!</h2>
                <p>Amazing! The puzzle is complete!</p>
            </div>
        </main>

        <footer class="footer">
            <p>Stena Line Easter Egg Hunt 2026</p>
        </footer>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon" id="modalIcon"></div>
                <h2 id="modalTitle"></h2>
                <p id="modalMessage"></p>
                <button class="btn btn-primary" id="modalClose">Close</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
