<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt - Stena Line</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-inner">
                <div class="header-logo">
                    <!-- Stena Line logo: flag + wordmark + red underline -->
                    <svg class="stena-logo" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- Flag pole -->
                        <rect x="126" y="0" width="3" height="52" fill="#003B7C"/>
                        <!-- Flag background -->
                        <rect x="129" y="2" width="38" height="28" rx="1" fill="#003B7C"/>
                        <!-- Flag white S-circle -->
                        <circle cx="148" cy="16" r="10" fill="#C8102E"/>
                        <text x="148" y="21" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="700" font-size="15" fill="#ffffff">S</text>
                        <!-- Wordmark: STENA LINE -->
                        <text x="0" y="72" font-family="'Open Sans', Arial, sans-serif" font-weight="700" font-size="38" fill="#003B7C" letter-spacing="1">Stena Line</text>
                        <!-- Red underline -->
                        <rect x="0" y="76" width="260" height="3" rx="1" fill="#C8102E"/>
                    </svg>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="hero">
                <h1>Easter Egg Hunt</h1>
                <p class="hero-sub">Find all 72 eggs and reveal the hidden puzzle!</p>
            </div>

            <div class="card">
                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-number" id="eggsFound">0</span>
                        <span class="stat-label">Found</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="eggsRemaining">72</span>
                        <span class="stat-label">Remaining</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">0% complete</p>
            </div>

            <div class="puzzle-card">
                <div class="puzzle-container" id="puzzleContainer"></div>
            </div>

            <div id="allFoundBanner" class="all-found-banner hidden">
                <h2>All eggs found!</h2>
                <p>Amazing! The puzzle is complete!</p>
            </div>
        </main>

        <footer class="footer">
            <p>Stena Line Easter Egg Hunt 2026</p>
        </footer>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon" id="modalIcon"></div>
                <h2 id="modalTitle"></h2>
                <p id="modalMessage"></p>
                <button class="btn btn-primary" id="modalClose">Close</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
