<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt - Stena Line</title>
    <link rel="icon" type="image/jpeg" href="images/faviconV2.jpg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-inner">
                <div class="header-logo">
                    <img class="stena-logo" src="images/stenalinelogo.jpg" alt="Stena Line">
                </div>
                <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
                    <span class="toggle-label">☀️</span>
                    <span class="toggle-track">
                        <span class="toggle-thumb"></span>
                    </span>
                    <span class="toggle-label">🌙</span>
                </button>
            </div>
        </header>

        <main class="container">
            <div class="hero">
                <h1>Easter Egg Hunt</h1>
                <p class="hero-sub">Find all 72 eggs and reveal the hidden puzzle!</p>
            </div>

            <div class="card" id="statsCard" style="opacity:0;transition:opacity 0.3s ease">
                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-number" id="eggsFound">-</span>
                        <span class="stat-label">Found</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="eggsRemaining">-</span>
                        <span class="stat-label">Remaining</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">
                        <svg class="progress-boat" viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg">
                            <!-- Hull -->
                            <path d="M4 28 L10 36 L54 36 L60 28 Z" fill="white" stroke="rgb(215,0,41)" stroke-width="1"/>
                            <!-- Hull red stripe -->
                            <path d="M6 30 L10 36 L54 36 L58 30 Z" fill="rgb(215,0,41)"/>
                            <!-- Cabin lower -->
                            <rect x="14" y="20" width="36" height="8" rx="1" fill="white" stroke="#ccc" stroke-width="0.5"/>
                            <!-- Windows -->
                            <circle cx="20" cy="24" r="2" fill="rgb(215,0,41)"/>
                            <circle cx="28" cy="24" r="2" fill="rgb(215,0,41)"/>
                            <circle cx="36" cy="24" r="2" fill="rgb(215,0,41)"/>
                            <circle cx="44" cy="24" r="2" fill="rgb(215,0,41)"/>
                            <!-- Upper deck -->
                            <rect x="18" y="13" width="28" height="7" rx="1" fill="white" stroke="#ccc" stroke-width="0.5"/>
                            <!-- Funnel -->
                            <rect x="36" y="5" width="6" height="8" rx="1" fill="white" stroke="#ccc" stroke-width="0.5"/>
                            <rect x="36" y="5" width="6" height="3" fill="rgb(215,0,41)"/>
                            <!-- Mast -->
                            <line x1="24" y1="6" x2="24" y2="13" stroke="#999" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <p class="progress-text" id="progressText">&nbsp;</p>
            </div>
            <div class="puzzle-card" id="puzzleCard" style="opacity:0;transition:opacity 0.3s ease">
                <div class="puzzle-container" id="puzzleContainer"></div>
            </div>

            <div id="allFoundBanner" class="all-found-banner hidden">
                <h2>All eggs found!</h2>
                <p>Amazing! The puzzle is complete!</p>
            </div>
        </main>

        <footer class="footer">
            <p>Stena Line Easter Egg Hunt 2026</p>
        </footer>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-icon" id="modalIcon"></div>
                <h2 id="modalTitle"></h2>
                <p id="modalMessage"></p>
                <button class="btn btn-primary" id="modalClose">Close</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
